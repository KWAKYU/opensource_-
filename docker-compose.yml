version: "3.9"

services:
  streamlit:
    build: .
    env_file: .env
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0

  cli:
    build: .
    env_file: .env
    stdin_open: true
    tty: true
    command: python -m src.main

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
